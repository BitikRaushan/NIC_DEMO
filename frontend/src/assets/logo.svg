<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ab00ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Orbital Ring 1 -->
  <ellipse cx="50" cy="50" rx="38" ry="12" fill="none" stroke="url(#neonGradient)" stroke-width="2" transform="rotate(-30 50 50)" opacity="0.6" stroke-dasharray="6,4" />
  <!-- Orbital Ring 2 -->
  <ellipse cx="50" cy="50" rx="38" ry="12" fill="none" stroke="url(#neonGradient)" stroke-width="2" transform="rotate(45 50 50)" filter="url(#glow)" />
  <!-- Center Core -->
  <circle cx="50" cy="50" r="8" fill="url(#neonGradient)" filter="url(#glow)" />
  <!-- Inner Detail -->
  <circle cx="50" cy="50" r="3" fill="#ffffff" />
  <!-- Connecting bridge lines -->
  <line x1="20" y1="50" x2="40" y2="50" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="2,2" />
  <line x1="60" y1="50" x2="80" y2="50" stroke="#ab00ff" stroke-width="1.5" stroke-dasharray="2,2" />
</svg>
